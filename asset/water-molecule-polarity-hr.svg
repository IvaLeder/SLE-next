<svg width="1500" height="1000" viewBox="0 0 1500 1000" xmlns="http://www.w3.org/2000/svg">
  <rect width="1500" height="1000" fill="#ffffff"/>

  <!-- title -->
  <text x="750" y="120" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="52" font-weight="bold" fill="#1f2937">Voda je polarna molekula</text>

  <!-- bonds (drawn first, under atoms) -->
  <line x1="750" y1="440" x2="520" y2="625" stroke="#9ca3af" stroke-width="30" stroke-linecap="round"/>
  <line x1="750" y1="440" x2="980" y2="625" stroke="#9ca3af" stroke-width="30" stroke-linecap="round"/>

  <!-- bond angle arc + label -->
  <path d="M 878 543 A 165 165 0 0 0 621 543" fill="none" stroke="#4b5563" stroke-width="5"/>
  <text x="750" y="640" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="40" font-weight="bold" fill="#4b5563">104.5&#176;</text>

  <!-- oxygen atom -->
  <circle cx="750" cy="440" r="120" fill="#ef4444" stroke="#b91c1c" stroke-width="6"/>
  <!-- lone pairs on oxygen -->
  <circle cx="686" cy="356" r="11" fill="#7f1d1d"/>
  <circle cx="712" cy="342" r="11" fill="#7f1d1d"/>
  <circle cx="788" cy="342" r="11" fill="#7f1d1d"/>
  <circle cx="814" cy="356" r="11" fill="#7f1d1d"/>
  <text x="750" y="470" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="88" font-weight="bold" fill="#ffffff">O</text>

  <!-- hydrogen atoms -->
  <circle cx="520" cy="625" r="88" fill="#f3f4f6" stroke="#9ca3af" stroke-width="6"/>
  <text x="520" y="653" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="72" font-weight="bold" fill="#374151">H</text>
  <circle cx="980" cy="625" r="88" fill="#f3f4f6" stroke="#9ca3af" stroke-width="6"/>
  <text x="980" y="653" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="72" font-weight="bold" fill="#374151">H</text>

  <!-- partial charges -->
  <text x="945" y="330" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="56" font-weight="bold" fill="#2563eb">&#948;&#8722;</text>
  <text x="360" y="690" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="52" font-weight="bold" fill="#ea580c">&#948;+</text>
  <text x="1140" y="690" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="52" font-weight="bold" fill="#ea580c">&#948;+</text>

  <!-- covalent bond callout -->
  <text x="1140" y="500" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="bold" fill="#1f2937">kovalentna veza</text>
  <text x="1140" y="540" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#4b5563">(dijeljeni elektroni)</text>
  <line x1="1130" y1="510" x2="880" y2="545" stroke="#1f2937" stroke-width="4"/>

  <!-- caption / legend -->
  <text x="750" y="850" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="38" font-weight="bold" fill="#1f2937">Kisikov kraj je slabo negativan (&#948;&#8722;), a vodikovi krajevi</text>
  <text x="750" y="900" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="38" font-weight="bold" fill="#1f2937">slabo pozitivni (&#948;+) &#8212; zbog toga je voda polarna.</text>
</svg>
