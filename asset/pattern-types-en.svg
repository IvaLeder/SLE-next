<svg width="1500" height="1000" viewBox="0 0 1500 1000" xmlns="http://www.w3.org/2000/svg"><rect width="1500" height="1000" fill="#ffffff"/><text x="750" y="110" font-family="Helvetica, Arial, sans-serif" font-size="60" font-weight="bold" text-anchor="middle" fill="#1f2937">Four kinds of repeating patterns</text><text x="750" y="170" font-family="Helvetica, Arial, sans-serif" font-size="30" text-anchor="middle" fill="#6b7280">Each row repeats by a rule — can you tell which shape hides under the ?</text><rect x="40" y="250" width="1420" height="160" rx="20" fill="#f8fafc"/><text x="90" y="322" font-family="Helvetica, Arial, sans-serif" font-size="52" font-weight="bold" text-anchor="start" fill="#1f2937">AB</text><text x="90" y="364" font-family="Helvetica, Arial, sans-serif" font-size="26" text-anchor="start" fill="#6b7280">two that alternate</text><circle cx="470" cy="330" r="46" fill="#378ADD"/><rect x="586" y="286" width="88" height="88" rx="10" fill="#D85A30"/><circle cx="790" cy="330" r="46" fill="#378ADD"/><rect x="906" y="286" width="88" height="88" rx="10" fill="#D85A30"/><circle cx="1110" cy="330" r="46" fill="#378ADD"/><rect x="1226" y="286" width="88" height="88" rx="12" fill="none" stroke="#9ca3af" stroke-width="4" stroke-dasharray="10 9"/><text x="1270" y="350" font-family="Helvetica, Arial, sans-serif" font-size="58" font-weight="bold" text-anchor="middle" fill="#9ca3af">?</text><rect x="40" y="420" width="1420" height="160" rx="20" fill="#f8fafc"/><text x="90" y="492" font-family="Helvetica, Arial, sans-serif" font-size="52" font-weight="bold" text-anchor="start" fill="#1f2937">ABB</text><text x="90" y="534" font-family="Helvetica, Arial, sans-serif" font-size="26" text-anchor="start" fill="#6b7280">one, then a pair</text><circle cx="470" cy="500" r="46" fill="#378ADD"/><rect x="586" y="456" width="88" height="88" rx="10" fill="#D85A30"/><rect x="746" y="456" width="88" height="88" rx="10" fill="#D85A30"/><circle cx="950" cy="500" r="46" fill="#378ADD"