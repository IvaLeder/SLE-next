       x2="380" y2="852" stroke="#451a03" stroke-width="9"/><line x1="423.84062043356596" y1="746.159379566434"
       x2="336.15937956643404" y2="833.840620433566" stroke="#451a03" stroke-width="9"/>
    <circle cx="380" cy="790" r="16" fill="#451a03"/><circle cx="1120" cy="790" r="80" fill="#7c2d12" stroke="#451a03" stroke-width="6"/>
    <line x1="1058" y1="790"
