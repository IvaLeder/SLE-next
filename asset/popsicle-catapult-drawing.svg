  <!-- A-frame -->
  <g stroke="#7c2d12" stroke-width="30" stroke-linecap="round">
    <line x1="700" y1="700" x2="880" y2="330"/>
    <line x1="1060" y1="700" x2="880" y2="330"/>
    <line x1="800" y1="500" x2="980" y2="500"/>
