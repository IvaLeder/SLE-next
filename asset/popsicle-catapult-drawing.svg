  <g>
    <line x1="430" y1="690" x2="1130" y2="280" stroke="#b45309" stroke-width="26" stroke-linecap="round"/>
    <path d="M 1100 295 a 60 60 0 0 0 95 -55 q -30 26 -95 55 Z" fill="#7c2d12" stroke="#451a03" stroke-width="4"/>
  </g>
  <!-- torsion rope at the pivot -->
  <circle cx="610" cy="585" r="26" fill="none" stroke="#d6b27c" stroke-width="10" stroke-dasharray="10 7"/>
  <!-- winch rope -->
  <line x1="430" y1="690" x2="610" y2="585" stroke="#d6b27c" stroke-width="7"/></svg>