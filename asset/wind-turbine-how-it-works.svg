<svg width="1500" height="1000" viewBox="0 0 1500 1000" xmlns="http://www.w3.org/2000/svg">
  <rect width="1500" height="1000" fill="#eff6ff"/>
  <rect y="850" width="1500" height="150" fill="#86efac"/>
  <rect y="850" width="1500" height="14" fill="#4ade80"/>

  <!-- 1: wind from the left -->
  <g stroke="#60a5fa" stroke-width="7" stroke-linecap="round" fill="none">
    <path d="M 60 200 h 130"/>
    <path d="M 176 188 L 192 200 L 176 212"/>
  </g>
  <g stroke="#60a5fa" stroke-width="7" stroke-linecap="round" fill="none">
    <path d="M 40 280 h 150"/>
    <path d="M 176 268 L 192 280 L 176 292"/>
  </g>
  <g stroke="#60a5fa" stroke-width="7" stroke-linecap="round" fill="none">
    <path d="M 60 360 h 130"/>
    <path d="M 176 348 L 192 360 L 176 372"/>
  </g>
  <circle cx="110" cy="170" r="22" fill="#4f46e5"/>
  <text x="110" y="179" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="26" font-weight="bold" fill="#ffffff">1</text>

  <!-- tower -->
  <path d="M 404 850 L 418 360 L 442 360 L 456 850 Z"
        fill="#e5e7eb" stroke="#9ca3af" stroke-width="3"/>

  <!-- 8: cable inside the tower -->
  <path d="M 430 380 L 430 890 L 700 890 L 700 840"
        fill="none" stroke="#dc2626" stroke-width="6" stroke-dasharray="2 14" stroke-linecap="round"/>
  <circle cx="500" cy="620" r="22" fill="#4f46e5"/>
  <text x="500" y="629" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="26" font-weight="bold" fill="#ffffff">8</text>
  <path d="M 475 620 L 438 620" stroke="#4f46e5" stroke-width="4"/>

  <!-- blades + hub (2) -->
  
    <g transform="rotate(20 430 320)">
      <path d="M 430 320
               C 402 230, 400 140, 418 55
               C 432 140, 446 230, 430 320 Z"
            fill="#f3f4f6" stroke="#9ca3af" stroke-width="3"/>
    </g>
    <g transform="rotate(140 430 320)">
      <path d="M 430 320
               C 402 230, 400 140, 418 55
               C 432 140, 446 230, 430 320 Z"
            fill="#f3f4f6" stroke="#9ca3af" stroke-width="3"/>
    </g>
    <g transform="rotate(260 430 320)">
      <path d="M 430 320
               C 402 230, 400 140, 418 55
               C 432 140, 446 230, 430 320 Z"
            fill="#f3f4f6" stroke="#9ca3af" stroke-width="3"/>
    </g>
  <circle cx="430" cy="320" r="26" fill="#d1d5db" stroke="#9ca3af" stroke-width="3"/>
  <!-- rotation arrow -->
  <path d="M 310 415 A 150 150 0 0 0 490 460"
        fill="none" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
  <path d="M 466 440 L 494 462 L 458 472"
        fill="#f59e0b"/>
  <circle cx="570" cy="90" r="22" fill="#4f46e5"/>
  <text x="570" y="99" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="26" font-weight="bold" fill="#ffffff">2</text>
  <path d="M 550 105 L 500 145" stroke="#4f46e5" stroke-width="4"/>

  <!-- 3: pitch mechanism at the hub -->
  <circle cx="350" cy="240" r="22" fill="#4f46e5"/>
  <text x="350" y="249" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="26" font-weight="bold" fill="#ffffff">3</text>
  <path d="M 365 255 L 406 300" stroke="#4f46e5" stroke-width="4"/>

  <!-- nacelle cutaway -->
  <rect x="440" y="268" width="300" height="104" rx="16"
        fill="#ffffff" stroke="#9ca3af" stroke-width="4"/>
  <!-- drive shaft -->
  <rect x="448" y="311" width="80" height="18" fill="#9ca3af"/>
  <!-- gearbox (4) -->
  <rect x="528" y="286" width="80" height="68" rx="8" fill="#4f46e5" stroke="#3730a3" stroke-width="3"/>
  <!-- shaft to generator -->
  <rect x="608" y="313" width="30" height="14" fill="#9ca3af"/>
  <!-- generator (5) -->
  <rect x="638" y="290" width="74" height="60" rx="8" fill="#f59e0b" stroke="#b45309" stroke-width="3"/>
  <circle cx="568" cy="223" r="22" fill="#4f46e5"/>
  <text x="568" y="232" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="26" font-weight="bold" fill="#ffffff">4</text>
  <path d="M 568 246 L 568 282" stroke="#4f46e5" stroke-width="4"/>
  <circle cx="675" cy="223" r="22" fill="#4f46e5"/>
  <text x="675" y="232" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="26" font-weight="bold" fill="#ffffff">5</text>
  <path d="M 675 246 L 675 286" stroke="#4f46e5" stroke-width="4"/>

  <!-- 6: anemometer on top -->
  <path d="M 728 268 v -34" stroke="#9ca3af" stroke-width="4"/>
  <circle cx="716" cy="228" r="7" fill="#1f2937"/>
  <circle cx="740" cy="228" r="7" fill="#1f2937"/>
  <path d="M 716 228 h 24" stroke="#1f2937" stroke-width="3"/>
  <circle cx="810" cy="183" r="22" fill="#4f46e5"/>
  <text x="810" y="192" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="26" font-weight="bold" fill="#ffffff">6</text>
  <path d="M 790 198 L 735 220" stroke="#4f46e5" stroke-width="4"/>

  <!-- 7: yaw motor + brakes under nacelle -->
  <rect x="406" y="372" width="48" height="22" rx="6" fill="#fb923c" stroke="#c2410c" stroke-width="3"/>
  <circle cx="560" cy="417" r="22" fill="#4f46e5"/>
  <text x="560" y="426" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="26" font-weight="bold" fill="#ffffff">7</text>
  <path d="M 538 410 L 458 384" stroke="#4f46e5" stroke-width="4"/>

  <!-- 9: transformer -->
  <rect x="660" y="770" width="80" height="80" rx="8" fill="#4b5563" stroke="#1f2937" stroke-width="3"/>
  <path d="M 685 790 l -12 24 h 14 l -12 24" stroke="#fbbf24" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="700" cy="720" r="22" fill="#4f46e5"/>
  <text x="700" y="729" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="26" font-weight="bold" fill="#ffffff">9</text>

  <!-- power line from transformer to houses -->
  <path d="M 740 810 L 1080 810" stroke="#dc2626" stroke-width="6" stroke-dasharray="2 14" stroke-linecap="round"/>

  <!-- 10: houses on the grid -->
  
    <rect x="1080" y="755" width="120" height="95" fill="#fde68a" stroke="#d97706" stroke-width="3"/>
    <path d="M 1066 755 L 1140 700 L 1214 755 Z"
          fill="#dc2626" stroke="#991b1b" stroke-width="3"/>
    <rect x="1125" y="798" width="30" height="52" fill="#92400e"/>
    <rect x="1094" y="772" width="26" height="24" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="2"/>
    <rect x="1160" y="772" width="26" height="24" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="2"/>
  
    <rect x="1260" y="755" width="120" height="95" fill="#fde68a" stroke="#d97706" stroke-width="3"/>
    <path d="M 1246 755 L 1320 700 L 1394 755 Z"
          fill="#dc2626" stroke="#991b1b" stroke-width="3"/>
    <rect x="1305" y="798" width="30" height="52" fill="#92400e"/>
    <rect x="1274" y="772" width="26" height="24" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="2"/>
    <rect x="1340" y="772" width="26" height="24" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="2"/>
  <circle cx="1180" cy="650" r="22" fill="#4f46e5"/>
  <text x="1180" y="659" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="26" font-weight="bold" fill="#ffffff">10</text>

  <!-- 11: slower, turbulent wind past the turbine -->
  <g stroke="#93c5fd" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M 880 170 q 40 -18 80 0 q 40 18 80 0"/>
    <path d="M 920 260 q 40 -18 80 0 q 40 18 80 0"/>
  </g>
  <g stroke="#93c5fd" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M 1090 215 h 80"/>
    <path d="M 1156 203 L 1172 215 L 1156 227"/>
  </g>
  <circle cx="1240" cy="240" r="22" fill="#4f46e5"/>
  <text x="1240" y="249" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="26" font-weight="bold" fill="#ffffff">11</text>
</svg>