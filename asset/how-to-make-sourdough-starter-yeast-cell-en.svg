<svg width="1500" height="1000" viewBox="0 0 1500 1000" xmlns="http://www.w3.org/2000/svg"><rect width="1500" height="1000" fill="#ffffff"/><text x="750" y="78" font-family="Helvetica, Arial, sans-serif" font-size="50" font-weight="bold" text-anchor="middle" fill="#FB6F52">How yeast works</text><text x="750" y="128" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="normal" text-anchor="middle" fill="#56536b">Yeast is a single-celled fungus. It grows by budding.</text><circle cx="280" cy="330" r="105" fill="#E6B24D" stroke="#B07C1E" stroke-width="6"/><ellipse cx="246.4" cy="294.3" rx="29.400000000000002" ry="18.9" fill="#ffffff" opacity="0.35"/><circle cx="280" cy="330" r="33.6" fill="#C98A2E"/><line x1="280" y1="225" x2="210" y2="205" stroke="#9b97a8" stroke-width="3"/><circle cx="210" cy="205" r="5" fill="#9b97a8"/><text x="205" y="195" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="normal" text-anchor="end" fill="#56536b">cell wall</text><line x1="258" y1="352" x2="178" y2="440" stroke="#9b97a8" stroke-width="3"/><circle cx="178" cy="440" r="5" fill="#9b97a8"/><text x="172" y="450" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="normal" text-anchor="end" fill="#56536b">nucleus</text><text x="280" y="500" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="normal" text-anchor="middle" fill="#2c2940">1. A single yeast cell</text><line x1="415" y1="330" x2="554" y2="330" stroke="#FB6F52" stroke-width="9" stroke-linecap="round"/>
    <path d="M 560 330 L 534 314 L 534 346 Z" fill="#FB6F52"/><circle cx="780.5" cy="234.1" r="57.8" fill="#E6B24D" stroke="#B07C1E" stroke-width="6"/><circle cx="780.5" cy="234.1" r="19.6" fill="#C98A2E"/><circle cx="700" cy="330" r="105" fill="#E6B24D" stroke="#B07C1E" stroke-width="6"/><ellipse cx="666.4" cy="294.3" rx="29.400000000000002" ry="18.9" fill="#ffffff" opacity="0.35"/><circle cx="700" cy="330" r="33.6" fill="#C98A2E"/><line x1="772" y1="232" x2="860" y2="175" stroke="#9b97a8" stroke-width="3"/><circle cx="860" cy="175" r="5" fill="#9b97a8"/><text x="870" y="170" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="normal" text-anchor="start" fill="#56536b">bud</text><text x="700" y="500" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="normal" text-anchor="middle" fill="#2c2940">2. A bud swells out</text><line x1="835" y1="330" x2="974" y2="330" stroke="#FB6F52" stroke-width="9" stroke-linecap="round"/>
    <path d="M 980 330 L 954 314 L 954 346 Z" fill="#FB6F52"/><circle cx="1120" cy="330" r="96" fill="#E6B24D" stroke="#B07C1E" stroke-width="6"/><ellipse cx="1089.28" cy="297.36" rx="26.880000000000003" ry="17.28" fill="#ffffff" opacity="0.35"/><circle cx="1120" cy="330" r="30.7" fill="#C98A2E"/><circle cx="1300" cy="262" r="66" fill="#E6B24D" stroke="#B07C1E" stroke-width="6"/><ellipse cx="1278.88" cy="239.56" rx="18.48" ry="11.879999999999999" fill="#ffffff" opacity="0.35"/><circle cx="1300" cy="262" r="21.1" fill="#C98A2E"/><text x="1180" y="500" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="normal" text-anchor="middle" fill="#2c2940">3. The bud breaks away</text><line x1="120" y1="560" x2="1380" y2="560" stroke="#e4dcca" stroke-width="3"/><text x="750" y="632" font-family="Helvetica, Arial, sans-serif" font-size="38" font-weight="bold" text-anchor="middle" fill="#2c2940">It eats sugar and gives off gas</text><polygon points="230.0,712.0 297.5,751.0 297.5,829.0 230.0,868.0 162.5,829.0 162.5,751.0" fill="#FCE9C0" stroke="#D9A441" stroke-width="7"/><text x="230" y="925" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="normal" text-anchor="middle" fill="#56536b">sugar</text><line x1="345" y1="790" x2="464" y2="790" stroke="#FB6F52" stroke-width="9" stroke-linecap="round"/>
    <path d="M 470 790 L 444 774 L 444 806 Z" fill="#FB6F52"/><circle cx="650" cy="750" r="58" fill="#BFE1F2" stroke="#7FB4D4" stroke-width="4"/><ellipse cx="632.6" cy="731.44" rx="17.4" ry="11.600000000000001" fill="#ffffff" opacity="0.55"/><circle cx="740" cy="810" r="44" fill="#BFE1F2" stroke="#7FB4D4" stroke-width="4"/><ellipse cx="726.8" cy="795.92" rx="13.2" ry="8.8" fill="#ffffff" opacity="0.55"/><circle cx="600" cy="835" r="36" fill="#BFE1F2" stroke="#7FB4D4" stroke-width="4"/><ellipse cx="589.2" cy="823.48" rx="10.799999999999999" ry="7.2" fill="#ffffff" opacity="0.55"/><circle cx="720" cy="730" r="30" fill="#BFE1F2" stroke="#7FB4D4" stroke-width="4"/><ellipse cx="711" cy="720.4" rx="9" ry="6" fill="#ffffff" opacity="0.55"/><text x="670" y="910" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" text-anchor="middle" fill="#2c2940">carbon dioxide gas</text><text x="670" y="948" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="normal" text-anchor="middle" fill="#FB6F52">(makes bread rise)</text><text x="950" y="802" font-family="Helvetica, Arial, sans-serif" font-size="60" font-weight="bold" text-anchor="middle" fill="#9b97a8">+</text><path d="M 1160 720 C 1210 780, 1210 820, 1160 835 C 1110 820, 1110 780, 1160 720 Z" fill="#E7ECF5" stroke="#9FB2D0" stroke-width="6"/><text x="1160" y="910" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="normal" text-anchor="middle" fill="#56536b">a little alcohol</text></svg>