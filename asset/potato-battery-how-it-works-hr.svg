<svg width="1500" height="1000" viewBox="0 0 1500 1000" xmlns="http://www.w3.org/2000/svg">
  <rect width="1500" height="1000" fill="#ffffff"/>

  <!-- potato body -->
  <path d="M 250 560
           C 200 440, 320 380, 460 400
           C 560 350, 720 360, 840 395
           C 1000 360, 1180 400, 1260 480
           C 1340 560, 1320 700, 1220 770
           C 1100 850, 900 870, 740 845
           C 560 880, 380 840, 300 750
           C 240 690, 230 630, 250 560 Z"
        fill="#fef3c7" stroke="#92400e" stroke-width="9"/>

  <!-- wires to the LED -->
  <path d="M 450 230 C 470 160, 620 130, 726 180"
        fill="none" stroke="#1f2937" stroke-width="7"/>
  <path d="M 1040 230 C 1020 160, 880 130, 774 180"
        fill="none" stroke="#dc2626" stroke-width="7"/>

  <!-- LED -->
  <circle cx="750" cy="120" r="70" fill="#fee2e2" opacity="0.8"/>
  <path d="M 716 138 a 34 34 0 1 1 68 0 v 24 h -68 Z"
        fill="#ef4444" stroke="#b91c1c" stroke-width="4"/>
  <rect x="710" y="162" width="80" height="10" fill="#b91c1c"/>

  <!-- electron flow along the wires -->
  <text x="560" y="135" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#4f46e5">e<tspan dy="-10.5" font-size="19.5">-</tspan></text>
  <line x1="595" y1="150" x2="645" y2="140" stroke="#4f46e5" stroke-width="4"/>
    <g transform="rotate(-11.309932474020213 645 140)">
    <path d="M 637 132 L 645 140 L 637 148" fill="none"
          stroke="#4f46e5" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="885" y="135" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#4f46e5">e<tspan dy="-10.5" font-size="19.5">-</tspan></text>
  <line x1="920" y1="150" x2="970" y2="165" stroke="#4f46e5" stroke-width="4"/>
    <g transform="rotate(16.69924423399362 970 165)">
    <path d="M 962 157 L 970 165 L 962 173" fill="none"
          stroke="#4f46e5" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- terminal polarity -->
  <text x="370" y="215" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="bold" fill="#1f2937">&#8211;</text>
  <text x="1090" y="215" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="bold" fill="#b91c1c">+</text>

  <!-- electrodes -->
  
    <rect x="422" y="230" width="56" height="540" rx="6"
          fill="#d1d5db" stroke="#6b7280" stroke-width="4"/>
    <text x="450" y="405" font-family="Helvetica, Arial, sans-serif" font-size="27" font-weight="bold" fill="#1f2937"
          text-anchor="middle" transform="rotate(-90 450 405)">Cinčana elektroda</text>
  
    <rect x="1012" y="230" width="56" height="540" rx="6"
          fill="#fb923c" stroke="#c2410c" stroke-width="4"/>
    <text x="1040" y="405" font-family="Helvetica, Arial, sans-serif" font-size="27" font-weight="bold" fill="#1f2937"
          text-anchor="middle" transform="rotate(-90 1040 405)">Bakrena elektroda</text>

  <!-- zinc side: Zn dissolving into Zn²⁺ -->
  <text x="488" y="480" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="bold" fill="#1f2937">Zn</text>
  <line x1="555" y1="470" x2="615" y2="450" stroke="#1f2937" stroke-width="4"/>
    <g transform="rotate(-18.43494882292201 615 450)">
    <path d="M 607 442 L 615 450 L 607 458" fill="none"
          stroke="#1f2937" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="625" y="460" font-family="Helvetica, Arial, sans-serif" font-size="32" fill="#1f2937">Zn<tspan dy="-11.2" font-size="20.8">2+</tspan></text>
  <text x="488" y="590" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="bold" fill="#1f2937">Zn</text>
  <line x1="555" y1="580" x2="615" y2="600" stroke="#1f2937" stroke-width="4"/>
    <g transform="rotate(18.43494882292201 615 600)">
    <path d="M 607 592 L 615 600 L 607 608" fill="none"
          stroke="#1f2937" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="625" y="615" font-family="Helvetica, Arial, sans-serif" font-size="32" fill="#1f2937">Zn<tspan dy="-11.2" font-size="20.8">2+</tspan></text>
  <text x="290" y="530" font-family="Helvetica, Arial, sans-serif" font-size="32" fill="#1f2937">Zn<tspan dy="-11.2" font-size="20.8">2+</tspan></text>

  <!-- electrolyte ions scattered in the potato -->
  <text x="340" y="640" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#1f2937">Kiselina<tspan dy="-10.5" font-size="19.5">-</tspan></text>
  <text x="700" y="480" font-family="Helvetica, Arial, sans-serif" font-size="32" fill="#1f2937">H<tspan dy="-11.2" font-size="20.8">+</tspan></text>
  <text x="560" y="730" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#1f2937">Kiselina<tspan dy="-10.5" font-size="19.5">-</tspan></text>
  <text x="770" y="700" font-family="Helvetica, Arial, sans-serif" font-size="32" fill="#1f2937">H<tspan dy="-11.2" font-size="20.8">+</tspan></text>
  <text x="330" y="730" font-family="Helvetica, Arial, sans-serif" font-size="32" fill="#1f2937">H<tspan dy="-11.2" font-size="20.8">+</tspan></text>
  <text x="1150" y="640" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#1f2937">Kiselina<tspan dy="-10.5" font-size="19.5">-</tspan></text>

  <!-- copper side: H⁺ ions picking up electrons → H₂ bubbles -->
  <text x="850" y="560" font-family="Helvetica, Arial, sans-serif" font-size="32" fill="#1f2937">H<tspan dy="-11.2" font-size="20.8">+</tspan></text>
  <line x1="905" y1="550" x2="975" y2="530" stroke="#1f2937" stroke-width="4"/>
    <g transform="rotate(-15.945395900922856 975 530)">
    <path d="M 967 522 L 975 530 L 967 538" fill="none"
          stroke="#1f2937" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="850" y="680" font-family="Helvetica, Arial, sans-serif" font-size="32" fill="#1f2937">H<tspan dy="-11.2" font-size="20.8">+</tspan></text>
  <line x1="905" y1="670" x2="975" y2="690" stroke="#1f2937" stroke-width="4"/>
    <g transform="rotate(15.945395900922856 975 690)">
    <path d="M 967 682 L 975 690 L 967 698" fill="none"
          stroke="#1f2937" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <circle cx="1135" cy="480" r="30" fill="#ffffff" stroke="#6b7280" stroke-width="3"/>
    <text x="1121" y="490" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#1f2937">H<tspan dy="8.4" font-size="18.2">2</tspan></text>
  <circle cx="1115" cy="600" r="30" fill="#ffffff" stroke="#6b7280" stroke-width="3"/>
    <text x="1101" y="610" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#1f2937">H<tspan dy="8.4" font-size="18.2">2</tspan></text>
  <circle cx="945" cy="380" r="30" fill="#ffffff" stroke="#6b7280" stroke-width="3"/>
    <text x="931" y="390" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#1f2937">H<tspan dy="8.4" font-size="18.2">2</tspan></text>

  <!-- potato label -->
  <text x="740" y="815" font-family="Helvetica, Arial, sans-serif" font-size="36" font-weight="bold" fill="#92400e" text-anchor="middle">Krumpir</text>
</svg>