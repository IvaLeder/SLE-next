<svg viewBox="0 0 1500 1000" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="1500" height="1000" fill="#ffffff"/>
  <text x="750" y="95" text-anchor="middle" font-size="42" font-weight="bold" fill="#222222">Krivulja tantruma: kada razgovarati?</text>

  <line x1="340" y1="210" x2="340" y2="790" stroke="#cccccc" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="570" y1="210" x2="570" y2="790" stroke="#cccccc" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="790" y1="210" x2="790" y2="790" stroke="#cccccc" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="1110" y1="210" x2="1110" y2="790" stroke="#cccccc" stroke-width="2" stroke-dasharray="8 8"/>

  <path d="M120,770 C260,745 430,560 570,300 C635,215 725,215 790,300 C900,450 1000,600 1110,690 C1210,745 1320,762 1420,768 L1420,790 L120,790 Z" fill="#D85A30" opacity="0.08"/>
  <path d="M120,770 C260,745 430,560 570,300 C635,215 725,215 790,300 C900,450 1000,600 1110,690 C1210,745 1320,762 1420,768" fill="none" stroke="#D85A30" stroke-width="8" stroke-linecap="round"/>

  <line x1="120" y1="790" x2="1432" y2="790" stroke="#333333" stroke-width="3"/>
  <path d="M1432,790 l-16,-8 v16 z" fill="#333333"/>
  <line x1="120" y1="790" x2="120" y2="198" stroke="#333333" stroke-width="3"/>
  <path d="M120,198 l-8,16 h16 z" fill="#333333"/>

  <text x="230" y="838" text-anchor="middle" font-size="27" fill="#555555">Okidač</text>
  <text x="455" y="838" text-anchor="middle" font-size="27" fill="#555555">Eskalacija</text>
  <text x="680" y="838" text-anchor="middle" font-size="27" fill="#555555">Vrhunac</text>
  <text x="950" y="838" text-anchor="middle" font-size="27" fill="#555555">Smirivanje</text>
  <text x="1265" y="838" text-anchor="middle" font-size="27" fill="#555555">Oporavak</text>
  <text x="770" y="915" text-anchor="middle" font-size="27" fill="#333333">Vrijeme</text>
  <text x="72" y="495" text-anchor="middle" font-size="27" fill="#333333" transform="rotate(-90 72 495)">Intenzitet emocija</text>

  <rect x="820" y="185" width="570" height="115" rx="14" fill="#FDF0EB" stroke="#D85A30" stroke-width="2.5"/>
  <text x="1105" y="233" text-anchor="middle" font-size="25" font-weight="bold" fill="#8A3A1E">U vrhuncu objašnjenja ne dopiru do djeteta.</text>
  <text x="1105" y="272" text-anchor="middle" font-size="25" fill="#8A3A1E">Ostanite mirni i budite blizu.</text>
  <line x1="818" y1="262" x2="765" y2="290" stroke="#D85A30" stroke-width="2.5" stroke-dasharray="6 6"/>

  <rect x="1010" y="430" width="380" height="145" rx="14" fill="#F2F7EA" stroke="#639922" stroke-width="2.5"/>
  <text x="1200" y="475" text-anchor="middle" font-size="25" font-weight="bold" fill="#3E6014">Sada je vrijeme za zagrljaj,</text>
  <text x="1200" y="510" text-anchor="middle" font-size="25" fill="#3E6014">podršku i razgovor</text>
  <text x="1200" y="545" text-anchor="middle" font-size="25" fill="#3E6014">o emocijama.</text>
  <line x1="1180" y1="577" x2="1130" y2="672" stroke="#639922" stroke-width="2.5" stroke-dasharray="6 6"/>
</svg>